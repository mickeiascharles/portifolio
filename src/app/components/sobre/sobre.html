<section class="sobre-container">
  <div class="content-wrapper">
    <div class="profile-header">
      <img src="assets/profile.webp" [alt]="language.text().about.profileAlt" class="profile-img" />
    </div>

    <div class="text-content">
      <p *ngFor="let paragraph of language.text().about.paragraphs">
        {{ paragraph }}
      </p>
    </div>

    <div class="skills-section">
      <h3>{{ language.text().about.languagesTitle }}</h3>
      <br />
      <div class="skill-group">
        <div class="icons">
          <img
            src="assets/icons/html5.svg"
            alt="HTML5"
            title="HTML5"
            class="skill-icon"
          />
          <img
            src="assets/icons/css3.svg"
            alt="CSS3"
            title="CSS3"
            class="skill-icon"
          />
          <img
            src="assets/icons/sql.svg"
            alt="MySQL"
            title="SQL"
            class="skill-icon"
          />
          <img
            src="assets/icons/java.svg"
            alt="Java"
            title="Java"
            class="skill-icon"
          />
          <img
            src="assets/icons/c.svg"
            alt="C"
            title="C"
            class="skill-icon"
          />
          <img
            src="assets/icons/swift.svg"
            alt="Swift"
            title="Swift"
            class="skill-icon"
          />
          <img
            src="assets/icons/javascript.svg"
            alt="JavaScript"
            title="JavaScript"
            class="skill-icon"
          />
          <img
            src="assets/icons/typescript.svg"
            alt="TypeScript"
            title="TypeScript"
            class="skill-icon"
          />
          <img
            src="assets/icons/python.svg"
            alt="Python"
            title="Python"
            class="skill-icon"
          />
          <img src="assets/icons/cpp.svg" alt="C++" title="C++" class="skill-icon" />
          <img src="assets/icons/dart.svg" alt="Dart" title="Dart" class="skill-icon" />
        </div>
      </div>

      <h3>{{ language.text().about.toolsTitle }}</h3>
      <br />
      <div class="skill-group">
        <div class="icons">
          <img
            src="assets/icons/nodejs.svg"
            alt="Node.js"
            title="Node.js"
            class="skill-icon"
          />
          <img
            src="assets/icons/react.svg"
            alt="React"
            title="React"
            class="skill-icon"
          />
          <img
            src="assets/icons/vite.svg"
            alt="Vite"
            title="Vite"
            class="skill-icon"
          />
          <img
            src="assets/icons/git.svg"
            alt="Git"
            title="Git"
            class="skill-icon"
          />
          <img
            src="assets/icons/axios.svg"
            alt="Axios"
            title="Axios"
            class="skill-icon"
          />
          <img
            src="assets/icons/angular.svg"
            alt="Angular"
            title="Angular"
            class="skill-icon"
          />
          <img
            src="assets/icons/postman.svg"
            alt="Postman"
            title="Postman"
            class="skill-icon"
          />
          <img
            src="assets/icons/express.svg"
            alt="Express"
            title="Express"
            class="skill-icon"
          />
        </div>
      </div>
    </div>

    <footer class="contacts-footer">
      <div class="social-links">
        <a href="https://github.com/mickeiascharles" target="_blank"
          ><i class="bi bi-github"></i
        ></a>
        <a href="https://www.instagram.com/mickeiascharles/" target="_blank"
          ><i class="bi bi-instagram"></i
        ></a>
        <a href="https://linkedin.com/in/mickeiascharles" target="_blank"
          ><i class="bi bi-linkedin"></i
        ></a>
      </div>

      <div class="contact-divider"></div>

      <div class="contact-info">
        <div class="contact-item">
          <i class="bi bi-whatsapp"></i>
          <span>+55 (21) 9 7099-2766</span>
        </div>
        <div class="contact-item">
          <i class="bi bi-envelope"></i>
          <span>contatomickeias@gmail.com</span>
        </div>
      </div>
    </footer>
  </div>
</section>
