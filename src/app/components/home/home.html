<section class="home-container">
  <div class="editor-toolbar">
    <button class="run-btn" (click)="openTerminal()" [title]="language.text().home.runButtonTitle">
      <i class="bi bi-play-fill"></i>
      <span>{{ language.text().home.runButton }}</span>
    </button>
  </div>

  <div class="code-background">
    <pre><code>{{ language.text().home.codeSample }}</code></pre>
  </div>

  <div class="character-wrapper">
    <img
      src="assets/character.webp"
      [alt]="language.text().home.characterAlt"
      class="character-img"
    />
  </div>

  <div class="terminal-overlay" *ngIf="isTerminalOpen" (click)="closeTerminal()">
    <div class="terminal-window" (click)="$event.stopPropagation()">
      <div class="terminal-header">
        <div class="terminal-title">
          <i class="bi bi-terminal-fill"></i>
          <span>{{ language.text().home.terminalTitle }}</span>
        </div>
        <button class="close-btn" (click)="closeTerminal()">
          <i class="bi bi-x-lg"></i>
        </button>
      </div>

      <div class="terminal-body">
        <p *ngFor="let line of displayedLines" [class]="line.cssClass">
          {{ line.text }}
        </p>
      </div>
    </div>
  </div>
</section>
