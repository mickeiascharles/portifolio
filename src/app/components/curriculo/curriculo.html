<section class="curriculo-container">
  <div class="download-section">
    <a
      href="assets/curriculo.pdf"
      [attr.download]="language.text().resume.downloadFileName"
      class="download-link"
    >
      <span class="highlight-letter">{{ language.text().resume.downloadLead }}</span
      >{{ language.text().resume.downloadRest }}
      <i class="bi bi-arrow-down-short"></i>
    </a>
  </div>

  <div class="resume-preview">
    <img src="assets/cv-page-1.jpg" [alt]="language.text().resume.pageOneAlt" />
    <img src="assets/carta-recomendacao.jpg" [alt]="language.text().resume.pageTwoAlt" />
  </div>
</section>
