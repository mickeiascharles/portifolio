<section class="projects-container">
  <div class="projetos-side-image">
    <img src="assets/projetos-bd.png" [alt]="language.text().projects.sideImageAlt" loading="eager" />
  </div>

  <article *ngFor="let project of language.text().projects.items" class="project-item">
    <h2>{{ project.title }}</h2>
    <p>{{ project.description }}</p>
    <div class="project-links">
      <a
        *ngFor="let link of project.links"
        [href]="link.href"
        target="_blank"
        class="link-btn"
        rel="noopener noreferrer"
      >
        <i [class]="link.iconClass"></i>
        <span>{{ link.label }}</span>
      </a>
    </div>
  </article>
</section>
