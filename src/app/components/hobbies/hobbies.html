<section class="hobbies-container">
  <div class="intro-text">
    <p>
      <span class="highlight-phrase">{{ language.text().hobbies.title }}</span>
    </p>
  </div>

  <div class="arts-wrapper">
    <article *ngFor="let item of language.text().hobbies.items" class="art-item">
      <p class="art-description">
        {{ item.description }}
      </p>

      <div class="image-frame">
        <img [src]="item.image" [alt]="item.alt" loading="lazy" />
      </div>

      <div class="tools-used">
        <span class="tool-label">{{ item.toolsLabel }}</span>
        <img
          *ngFor="let tool of item.tools"
          [src]="tool.src"
          [alt]="tool.alt"
          class="tool-icon"
          loading="lazy"
        />
      </div>
    </article>
  </div>

  <div class="hobbies-bg-character">
    <img src="assets/character-full.png" [alt]="language.text().hobbies.backgroundAlt" />
  </div>
</section>
